<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LIU Y.</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #fff;
    }

    .hero {
      height: 100vh;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .hero img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.6;
    }

    .hero-text {
      position: relative;
      text-align: center;
      z-index: 1;
    }

    .hero-text h1 {
      font-size: 72px;
      font-weight: 300;
      letter-spacing: 12px;
      text-transform: uppercase;
    }

    .hero-text p {
      margin-top: 16px;
      font-size: 14px;
      letter-spacing: 4px;
      color: #aaa;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <section class="hero">
    <img src="motorcycle.png" alt="motorcycle">
    <div class="hero-text">
      <h1>LIU Y.</h1>
      <p>Personal Blog</p>
    </div>
  </section>
</body>
</html>
